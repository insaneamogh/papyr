version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Mount DB to persist data
      - ./backend/papyr.db:/app/papyr.db
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./papyr.db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Tell frontend to hit the backend service container
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
